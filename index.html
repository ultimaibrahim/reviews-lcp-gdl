<style>
:root {
  --verde:      #3D5A47;
  --verde-deep: #2C4234;
  --sage:       #7A9E8A;
  --sage-light: #B5CFC3;
  --crema:      #F5EFE6;
  --crema-dark: #EDE4D6;
  --negro:      #1A1A1A;
  --blanco:     #FFFFFF;
  --alerta:     #C0392B;
  --alerta-bg:  #FCF0EE;
  --oro:        #C9A84C;
  --sombra:     rgba(61,90,71,0.12);
  --sombra-lg:  rgba(61,90,71,0.2);
  --radius:     14px;
  --radius-sm:  8px;
  --bg:         #F5EFE6;
  --surface:    #FFFFFF;
  --text:       #1A1A1A;
  --text-muted: #777;
  --border:     rgba(0,0,0,0.08);
  --input-bg:   #EDE4D6;
}
[data-theme="dark"] {
  --bg:         #141A17;
  --surface:    #1E2922;
  --text:       #EEE8DF;
  --text-muted: #8A9E94;
  --border:     rgba(255,255,255,0.08);
  --input-bg:   #232E28;
  --sombra:     rgba(0,0,0,0.35);
  --sombra-lg:  rgba(0,0,0,0.5);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',Calibri,system-ui,sans-serif;min-height:100vh;overflow-x:hidden;transition:background .3s,color .3s;}
#app{opacity:1;transition:opacity .22s ease;}
#app.fade-out{opacity:0;}

/* TOPBAR */
.topbar{background:var(--verde);color:#F5EFE6;padding:0 18px;display:flex;align-items:center;justify-content:space-between;height:50px;position:sticky;top:0;z-index:200;box-shadow:0 2px 14px rgba(0,0,0,.22);}
.topbar-left{display:flex;align-items:center;gap:10px;}
.topbar-back{background:rgba(255,255,255,.12);border:none;color:#F5EFE6;border-radius:7px;padding:5px 10px;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:5px;transition:background .15s;}
.topbar-back:hover{background:rgba(255,255,255,.22);}
.topbar-brand{font-family:'Arial Black',Arial,sans-serif;font-size:12px;letter-spacing:.1em;text-transform:uppercase;}
.topbar-right{display:flex;align-items:center;gap:10px;}
.topbar-region{font-size:10px;opacity:.55;letter-spacing:.12em;text-transform:uppercase;}
.dark-toggle{background:rgba(255,255,255,.12);border:none;color:#F5EFE6;border-radius:20px;padding:4px 12px;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:5px;transition:background .15s;white-space:nowrap;}
.dark-toggle:hover{background:rgba(255,255,255,.22);}

/* HERO HOME */
.hero{position:relative;background:var(--verde);color:#F5EFE6;padding:44px 22px 52px;overflow:hidden;}
.hero-arc1{position:absolute;right:-50px;bottom:-70px;width:280px;height:280px;border-radius:50%;border:36px solid rgba(122,158,138,.2);pointer-events:none;}
.hero-arc2{position:absolute;left:-30px;top:-50px;width:190px;height:190px;border-radius:50%;border:24px solid rgba(245,239,230,.07);pointer-events:none;}
.hero-label{font-size:10px;letter-spacing:.2em;text-transform:uppercase;opacity:.55;margin-bottom:8px;}
.hero-score-row{display:flex;align-items:flex-end;gap:14px;flex-wrap:wrap;}
.hero-score-num{font-family:'Arial Black',Arial,sans-serif;font-size:clamp(68px,20vw,110px);line-height:1;color:#F5EFE6;opacity:0;transform:translateY(16px);transition:opacity .65s ease,transform .65s ease;}
.hero-score-num.in{opacity:1;transform:translateY(0);}
.hero-score-stars{font-size:clamp(20px,6vw,32px);color:#C9A84C;margin-bottom:8px;letter-spacing:2px;}
.hero-pills{margin-top:16px;display:flex;gap:8px;flex-wrap:wrap;}
.hero-pill{background:rgba(245,239,230,.1);border:1px solid rgba(245,239,230,.18);border-radius:20px;padding:5px 13px;font-size:12px;backdrop-filter:blur(4px);}
.hero-pill strong{color:#B5CFC3;}
.hero-live{display:flex;align-items:center;gap:6px;font-size:11px;opacity:.65;margin-top:14px;}
.pulse-dot{width:7px;height:7px;border-radius:50%;background:#5AC987;animation:pulse 2.2s infinite;}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(90,201,135,.5);}50%{box-shadow:0 0 0 5px rgba(90,201,135,0);}}

/* ALERT */
.alert-banner{background:var(--alerta-bg);border-left:4px solid var(--alerta);margin:14px 14px 0;border-radius:10px;padding:11px 15px;display:flex;gap:10px;align-items:flex-start;animation:slideDown .45s ease .3s both;}
[data-theme="dark"] .alert-banner{background:rgba(192,57,43,.15);}
@keyframes slideDown{from{opacity:0;transform:translateY(-10px);}to{opacity:1;transform:translateY(0);}}
.alert-icon{font-size:17px;flex-shrink:0;}
.alert-text{font-size:12px;line-height:1.55;color:#8B1A1A;}
[data-theme="dark"] .alert-text{color:#F08080;}
.alert-text strong{display:block;font-size:10px;text-transform:uppercase;letter-spacing:.1em;margin-bottom:2px;}

/* SECTION */
.section{padding:26px 14px 10px;}
.section-title{font-family:'Arial Black',Arial,sans-serif;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--sage);margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.section-title::after{content:'';flex:1;height:1px;background:rgba(122,158,138,.25);}

/* BRANCH GRID */
.branch-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}
@media(min-width:480px){.branch-grid{grid-template-columns:repeat(4,1fr);}}
.branch-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:16px 10px 14px;cursor:pointer;text-align:center;transition:border-color .2s,box-shadow .2s,transform .15s;box-shadow:0 1px 4px var(--sombra);position:relative;overflow:hidden;text-decoration:none;display:block;}
.branch-card:hover{border-color:var(--sage);transform:translateY(-3px);box-shadow:0 8px 22px var(--sombra-lg);}
.branch-card.has-alert::after{content:'!';position:absolute;top:7px;right:8px;background:var(--alerta);color:#fff;font-size:9px;font-weight:900;width:15px;height:15px;border-radius:50%;display:flex;align-items:center;justify-content:center;line-height:15px;}
.bc-name{font-family:'Arial Black',Arial,sans-serif;font-size:9px;letter-spacing:.06em;text-transform:uppercase;color:var(--text);line-height:1.35;margin-bottom:8px;}
.bc-score{font-family:'Arial Black',Arial,sans-serif;font-size:26px;color:var(--verde);line-height:1;}
[data-theme="dark"] .bc-score{color:#B5CFC3;}
.bc-stars{color:#C9A84C;font-size:10px;margin-top:3px;letter-spacing:1px;}
.bc-count{font-size:10px;color:var(--text-muted);margin-top:4px;}
.bc-arrow{margin-top:8px;font-size:10px;color:var(--sage);opacity:0;transition:opacity .15s;}
.branch-card:hover .bc-arrow{opacity:1;}

/* CHART CARD */
.chart-card{background:var(--surface);border-radius:var(--radius);box-shadow:0 1px 8px var(--sombra);padding:18px 16px 14px;}
.chart-wrap{position:relative;height:200px;}

/* TREND BARS */
.trend-row{margin-bottom:10px;}
.trend-row-header{display:flex;justify-content:space-between;font-size:11px;margin-bottom:4px;color:var(--text);}
.trend-row-header span{color:var(--text-muted);font-size:10px;}
.trend-dual{display:flex;gap:3px;flex-direction:column;}
.bar-wrap{height:6px;background:var(--input-bg);border-radius:4px;overflow:hidden;}
.bar-fill{height:100%;border-radius:4px;width:0;transition:width 1s cubic-bezier(.4,0,.2,1);}
.bar-hist{background:#B5CFC3;}
.bar-abr{background:var(--verde);}
[data-theme="dark"] .bar-abr{background:var(--sage);}

/* BRANCH HERO */
.branch-hero{background:var(--verde);color:#F5EFE6;padding:32px 22px 36px;position:relative;overflow:hidden;}
.branch-hero::after{content:'';position:absolute;right:-40px;bottom:-40px;width:180px;height:180px;border-radius:50%;border:30px solid rgba(122,158,138,.2);pointer-events:none;}
.bh-month{font-size:10px;letter-spacing:.18em;text-transform:uppercase;opacity:.55;margin-bottom:6px;}
.bh-name{font-family:'Arial Black',Arial,sans-serif;font-size:clamp(22px,6vw,32px);line-height:1.1;margin-bottom:16px;}
.bh-metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.bh-metric{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:10px;padding:12px 8px;text-align:center;}
.bh-metric-val{font-family:'Arial Black',Arial,sans-serif;font-size:22px;color:#F5EFE6;line-height:1;}
.bh-metric-val.gold{color:#C9A84C;}
.bh-metric-label{font-size:9px;text-transform:uppercase;letter-spacing:.1em;opacity:.6;margin-top:4px;}

/* INSIGHT CARDS */
.insight-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
.insight-card{background:var(--surface);border-radius:var(--radius-sm);padding:14px 12px;box-shadow:0 1px 5px var(--sombra);display:flex;gap:10px;align-items:flex-start;}
.insight-icon{font-size:20px;flex-shrink:0;}
.insight-label{font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:var(--sage);font-weight:700;margin-bottom:3px;}
.insight-val{font-size:12px;color:var(--text);line-height:1.45;}
.insight-card.full{grid-column:1 / -1;}

/* STATUS */
.status-section{background:var(--surface);border-radius:var(--radius);box-shadow:0 1px 8px var(--sombra);overflow:hidden;margin-bottom:4px;}
.status-header{padding:14px 18px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none;}
.status-header-left{display:flex;align-items:center;gap:10px;}
.status-badge{display:flex;align-items:center;gap:5px;font-family:'Arial Black',Arial,sans-serif;font-size:10px;letter-spacing:.1em;text-transform:uppercase;}
.status-badge.ok{color:#3D9E6A;}
.status-badge.warn{color:var(--alerta);}
.status-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.status-dot.ok{background:#3D9E6A;animation:pulse 2.2s infinite;}
.status-dot.warn{background:var(--alerta);}
.status-chevron{font-size:14px;color:var(--text-muted);transition:transform .25s;display:inline-block;}
.status-chevron.open{transform:rotate(180deg);}
.status-body{padding:0 18px 16px;display:none;}
.status-body.open{display:block;}
.status-warn-box{background:var(--alerta-bg);border:1px solid rgba(192,57,43,.18);border-radius:var(--radius-sm);padding:11px 13px;font-size:12px;color:#8B1A1A;margin-bottom:12px;}
[data-theme="dark"] .status-warn-box{background:rgba(192,57,43,.15);color:#F08080;}
.status-ok-box{background:rgba(61,158,106,.1);border:1px solid rgba(61,158,106,.2);border-radius:var(--radius-sm);padding:11px 13px;font-size:12px;color:#1A5A35;margin-bottom:12px;}
[data-theme="dark"] .status-ok-box{background:rgba(61,158,106,.15);color:#5CE89A;}

/* REVIEWS */
.reviews-panel{background:var(--surface);border-radius:var(--radius);box-shadow:0 1px 8px var(--sombra);overflow:hidden;}
.reviews-panel-header{padding:14px 18px 0;display:flex;align-items:center;justify-content:space-between;}
.rph-title{font-family:'Arial Black',Arial,sans-serif;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--sage);}
.rph-count{font-size:11px;color:var(--text-muted);}
.reviews-list{padding:6px 18px 4px;}
.review-item{border-top:1px solid var(--border);padding:12px 0;}
.review-item:first-child{border-top:none;}
.rev-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px;}
.rev-author{font-weight:600;font-size:12px;color:var(--text);}
.rev-stars{color:#C9A84C;font-size:11px;letter-spacing:1px;}
.rev-date{font-size:10px;color:var(--text-muted);margin-bottom:5px;}
.rev-text{font-size:13px;color:var(--text);line-height:1.55;}
.rev-guide{display:inline-block;background:rgba(122,158,138,.15);color:var(--sage);font-size:9px;text-transform:uppercase;letter-spacing:.1em;padding:1px 6px;border-radius:4px;margin-left:5px;vertical-align:middle;}
.show-all-btn{display:block;width:calc(100% - 36px);margin:4px 18px 16px;background:var(--input-bg);border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:10px;font-size:12px;font-weight:600;color:var(--verde);cursor:pointer;text-align:center;letter-spacing:.06em;transition:background .15s,border-color .15s;}
[data-theme="dark"] .show-all-btn{color:#B5CFC3;}
.show-all-btn:hover{background:#B5CFC3;border-color:var(--sage);color:var(--verde-deep);}

/* FOOTER */
.footer{padding:24px 18px;text-align:center;font-size:10px;color:var(--text-muted);letter-spacing:.06em;}
.footer strong{color:var(--sage);}

/* REVEAL */
.r{opacity:0;transform:translateY(12px);transition:opacity .5s ease,transform .5s ease;}
.r.in{opacity:1;transform:translateY(0);}
</style>
</head>

/* ── THEME ─────────────────────────────────────────────────── */
let darkMode = localStorage.getItem('lcpDark') === '1';
function applyTheme(){document.documentElement.setAttribute('data-theme',darkMode?'dark':'light');}
applyTheme();
function toggleDark(){darkMode=!darkMode;localStorage.setItem('lcpDark',darkMode?'1':'0');applyTheme();route();}

/* ── ROUTER ────────────────────────────────────────────────── */
function destroyCharts(){
  const ids = Object.keys(Chart.instances);
  ids.forEach(id=>{try{Chart.instances[id].destroy();}catch(e){}});
}
function route(){
  const hash=window.location.hash||'#/';
  const app=document.getElementById('app');
  app.classList.add('fade-out');
  destroyCharts();
  setTimeout(()=>{
    if(hash.startsWith('#/sucursal/')){
      const id=hash.replace('#/sucursal/','');
      const s=SUCURSALES.find(x=>x.id===id);
      s?renderBranch(s):renderHome();
    } else {renderHome();}
    app.classList.remove('fade-out');
    window.scrollTo(0,0);
    initReveal();
  },200);
}
window.addEventListener('hashchange',route);
window.addEventListener('load',route);

/* ── TOPBAR ────────────────────────────────────────────────── */
function buildTopbar(showBack=false,branchName=''){
  const back=showBack?`<button class="topbar-back" onclick="window.location.hash='#/'">&#8592; Inicio</button>`:'';
  const brand=showBack
    ?`<span class="topbar-brand" style="font-size:11px;">${branchName}</span>`
    :`<span class="topbar-brand">La Crêpe Parisienne</span>`;
  const dark=darkMode?'&#9728; Claro':'&#9790; Oscuro';
  return `<header class="topbar">
    <div class="topbar-left">${back}${brand}</div>
    <div class="topbar-right">
      ${!showBack?'<span class="topbar-region">GDL · 2026</span>':''}
      <button class="dark-toggle" onclick="toggleDark()">${dark}</button>
    </div>
  </header>`;
}

/* ── STARS ─────────────────────────────────────────────────── */
function starStr(n){return '★'.repeat(n)+'☆'.repeat(5-n);}

/* ── HOME ──────────────────────────────────────────────────── */
function renderHome(){
  const sorted=[...SUCURSALES].sort((a,b)=>b.abril.count-a.abril.count);
  const cards=sorted.map(s=>`
    <a class="branch-card${s.alerta?' has-alert':''}" href="#/sucursal/${s.id}">
      <div class="bc-name">${s.abr}</div>
      <div class="bc-score">${s.abril.score.toFixed(2)}</div>
      <div class="bc-stars">&#9733;&#9733;&#9733;&#9733;&#9733;</div>
      <div class="bc-count">${s.abril.count} reseña${s.abril.count!==1?'s':''}</div>
      <div class="bc-arrow">Ver detalle &#8594;</div>
    </a>`).join('');

  const trends=sorted.map(s=>{
    const pH=((s.historico-3.5)/1.5*100).toFixed(1);
    return `<div class="trend-row">
      <div class="trend-row-header">
        <strong>${s.abr}</strong>
        <span>Hist: ${s.historico} &rarr; <strong style="color:var(--verde)">5.00</strong></span>
      </div>
      <div class="trend-dual">
        <div class="bar-wrap"><div class="bar-fill bar-hist" data-w="${pH}"></div></div>
        <div class="bar-wrap"><div class="bar-fill bar-abr"  data-w="100"></div></div>
      </div>
    </div>`;}).join('');

  document.getElementById('app').innerHTML=`
    ${buildTopbar()}
    <section class="hero">
      <div class="hero-arc1"></div><div class="hero-arc2"></div>
      <div class="hero-label">Promedio Regional · Abril 2026</div>
      <div class="hero-score-row">
        <span class="hero-score-num" id="heroNum">5.00</span>
        <span class="hero-score-stars">&#9733;&#9733;&#9733;&#9733;&#9733;</span>
      </div>
      <div class="hero-pills">
        <span class="hero-pill"><strong>74</strong> reseñas</span>
        <span class="hero-pill"><strong>8</strong> sucursales</span>
        <span class="hero-pill"><strong>100%</strong> cinco estrellas</span>
      </div>
      <div class="hero-live"><span class="pulse-dot"></span>&nbsp;Primer mes limpio desde inicio de monitoreo</div>
    </section>
    <div class="alert-banner">
      <span class="alert-icon">&#9888;&#65039;</span>
      <div class="alert-text">
        <strong>Alerta &middot; Mayo 2026 (primeros 10 días)</strong>
        Andares (&times;1), Plaza Patria (&times;2) y Midtown (&times;3) con reseñas negativas. Patrón: calidad de ingredientes y errores en pedidos.
      </div>
    </div>
    <section class="section r">
      <div class="section-title">Sucursales</div>
      <div class="branch-grid">${cards}</div>
    </section>
    <section class="section r">
      <div class="section-title">Histórico vs Abril 2026</div>
      <div class="chart-card">${trends}</div>
    </section>
    <section class="section r">
      <div class="section-title">Volumen de reseñas · Abril 2026</div>
      <div class="chart-card"><div class="chart-wrap"><canvas id="volChart"></canvas></div></div>
    </section>
    <footer class="footer"><strong>La Crêpe Parisienne</strong> · Grupo MYT / Grupo Corporativo Alancar<br>Dashboard de Reseñas · Región Guadalajara · Datos: Google Reviews</footer>`;

  requestAnimationFrame(()=>document.getElementById('heroNum')?.classList.add('in'));
  setTimeout(()=>document.querySelectorAll('.bar-fill').forEach(b=>b.style.width=b.dataset.w+'%'),350);

  const ctx=document.getElementById('volChart')?.getContext('2d');
  if(ctx){
    new Chart(ctx,{
      type:'bar',
      data:{
        labels:sorted.map(s=>s.abr),
        datasets:[{
          label:'Reseñas',
          data:sorted.map(s=>s.abril.count),
          backgroundColor:sorted.map((_,i)=>i===0?'rgba(61,90,71,0.85)':darkMode?'rgba(122,158,138,0.5)':'rgba(122,158,138,0.6)'),
          borderRadius:7,borderSkipped:false
        }]
      },
      options:{
        responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:false}},
        scales:{
          y:{beginAtZero:true,grid:{color:darkMode?'rgba(255,255,255,0.06)':'rgba(0,0,0,0.05)'},ticks:{font:{size:10},color:darkMode?'#8A9E94':'#888',precision:0}},
          x:{grid:{display:false},ticks:{font:{size:10},color:darkMode?'#8A9E94':'#666',maxRotation:30}}
        }
      }
    });
  }
}

/* ── BRANCH ────────────────────────────────────────────────── */
function buildInsights(s){
  const all=s.reseñasAbril.map(r=>r.text.toLowerCase()).join(' ');
  const items=[];
  const delta=(s.abril.score-s.historico).toFixed(2);
  const dStr=Number(delta)>0?`+${delta} vs histórico`:Number(delta)<0?`${delta} vs histórico`:'Sin cambio vs histórico';
  items.push({icon:'📈',label:'Tendencia',val:dStr});
  if(/(amable|atentos?|servicio|atenci[oó]n)/.test(all)) items.push({icon:'💬',label:'Tema dominante',val:'Atención y servicio al cliente destacados'});
  if(/(rique?[aá]|delici|bueno|sabor|rico)/.test(all)) items.push({icon:'🥐',label:'Producto',val:'Sabor y calidad de producto bien valorados'});
  const names=[...new Set((all.match(/\b(valentina|osvaldo|arely|vale|areli|daniela)\b/g)||[]))].map(n=>n[0].toUpperCase()+n.slice(1));
  if(names.length) items.push({icon:'⭐',label:'Colaboradores mencionados',val:names.join(', ')});
  if(/(r[aá]pido|tiempo|eficiente)/.test(all)) items.push({icon:'⚡',label:'Velocidad',val:'Rapidez en atención comentada positivamente'});
  return items.slice(0,4).map((t,i)=>`
    <div class="insight-card${i===3?' full':''}">
      <span class="insight-icon">${t.icon}</span>
      <div><div class="insight-label">${t.label}</div><div class="insight-val">${t.val}</div></div>
    </div>`).join('');
}

function buildRevList(reviews){
  return reviews.map(r=>`
    <div class="review-item">
      <div class="rev-top">
        <span class="rev-author">Reseñante de Google${r.guide?'<span class="rev-guide">Local Guide</span>':''}</span>
        <span class="rev-stars">${starStr(r.stars)}</span>
      </div>
      <div class="rev-date">${r.fecha}</div>
      <div class="rev-text">${r.text.replace(/\n/g,'<br>')}</div>
    </div>`).join('');
}

function renderBranch(s){
  const delta=(s.abril.score-s.historico).toFixed(2);
  const dStr=Number(delta)>=0?`+${delta}`:delta;
  const statusDot=s.alerta?'warn':'ok';
  const statusLabel=s.alerta?'Atención requerida':'Sin alertas activas';

  let statusContent='';
  if(!s.alerta){
    statusContent=`<div class="status-ok-box">&#9989; Sin incidencias registradas en los primeros 10 días de mayo. La sucursal se mantiene estable.</div>`;
  } else {
    const mayoItems=s.reseñasMayo.map(r=>`
      <div class="review-item">
        <div class="rev-top">
          <span class="rev-author" style="color:var(--alerta);">Reseñante de Google</span>
          <span class="rev-stars" style="color:var(--alerta);">${starStr(r.stars)}</span>
        </div>
        <div class="rev-date">${r.fecha}</div>
        <div class="rev-text" style="color:#8B1A1A;">${r.text}</div>
      </div>`).join('');
    statusContent=`
      <div class="status-warn-box">
        &#9888;&#65039; <strong>${s.statusMayo.negativas} reseña${s.statusMayo.negativas!==1?'s':''} negativa${s.statusMayo.negativas!==1?'s':''}</strong><br>${s.statusMayo.tema}
      </div>${mayoItems}`;
  }

  document.getElementById('app').innerHTML=`
    ${buildTopbar(true,s.nombre)}
    <section class="branch-hero">
      <div class="bh-month">Abril 2026 · Guadalajara</div>
      <div class="bh-name">${s.nombre}</div>
      <div class="bh-metrics">
        <div class="bh-metric"><div class="bh-metric-val gold">${s.abril.score.toFixed(2)}</div><div class="bh-metric-label">Promedio Abr</div></div>
        <div class="bh-metric"><div class="bh-metric-val">${s.abril.count}</div><div class="bh-metric-label">Reseñas</div></div>
        <div class="bh-metric"><div class="bh-metric-val">${dStr}</div><div class="bh-metric-label">&Delta; vs Hist.</div></div>
      </div>
    </section>
    <section class="section r">
      <div class="section-title">Insights · Abril 2026</div>
      <div class="insight-grid">${buildInsights(s)}</div>
    </section>
    <section class="section r">
      <div class="section-title">Comparativo de rating</div>
      <div class="chart-card"><div class="chart-wrap"><canvas id="branchChart"></canvas></div></div>
    </section>
    <section class="section r">
      <div class="section-title">Status actual · Mayo 2026</div>
      <div class="status-section">
        <div class="status-header" id="sHdr">
          <div class="status-header-left">
            <span class="status-dot ${statusDot}"></span>
            <span class="status-badge ${statusDot}">${statusLabel}</span>
          </div>
          <span class="status-chevron" id="sChev">&#9660;</span>
        </div>
        <div class="status-body" id="sBody">${statusContent}</div>
      </div>
    </section>
    <section class="section r">
      <div class="section-title">Reseñas · Abril 2026</div>
      <div class="reviews-panel">
        <div class="reviews-panel-header">
          <span class="rph-title">Reseñas verificadas</span>
          <span class="rph-count">${s.reseñasAbril.length} total</span>
        </div>
        <div class="reviews-list" id="revList">${buildRevList(s.reseñasAbril.slice(0,3))}</div>
        ${s.reseñasAbril.length>3?`<button class="show-all-btn" id="showAllBtn">Mostrar todas las ${s.reseñasAbril.length} reseñas &#8595;</button>`:''}
      </div>
    </section>
    <footer class="footer"><strong>La Crêpe Parisienne</strong> · ${s.nombre}<br>Dashboard de Reseñas · Región Guadalajara</footer>`;

  // Status toggle
  document.getElementById('sHdr').onclick=()=>{
    document.getElementById('sBody').classList.toggle('open');
    document.getElementById('sChev').classList.toggle('open');
  };

  // Show all
  const btn=document.getElementById('showAllBtn');
  if(btn){
    let exp=false;
    btn.onclick=()=>{
      exp=!exp;
      document.getElementById('revList').innerHTML=buildRevList(exp?s.reseñasAbril:s.reseñasAbril.slice(0,3));
      btn.textContent=exp?'\u2191 Mostrar menos':`Mostrar todas las ${s.reseñasAbril.length} reseñas \u2193`;
    };
  }

  // Chart
  const ctx=document.getElementById('branchChart')?.getContext('2d');
  if(ctx){
    new Chart(ctx,{
      type:'bar',
      data:{
        labels:['Rating histórico','Abril 2026'],
        datasets:[{
          data:[s.historico,s.abril.score],
          backgroundColor:darkMode?['rgba(122,158,138,0.4)','rgba(122,158,138,0.85)']:['rgba(122,158,138,0.5)','rgba(61,90,71,0.85)'],
          borderRadius:8,borderSkipped:false
        }]
      },
      options:{
        responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:false}},
        scales:{
          y:{min:3.5,max:5.2,grid:{color:darkMode?'rgba(255,255,255,0.06)':'rgba(0,0,0,0.06)'},ticks:{font:{size:10},color:darkMode?'#8A9E94':'#888'}},
          x:{grid:{display:false},ticks:{font:{size:11},color:darkMode?'#8A9E94':'#555'}}
        }
      }
    });
  }
}

/* ── REVEAL ────────────────────────────────────────────────── */
function initReveal(){
  const obs=new IntersectionObserver(es=>{es.forEach(e=>{if(e.isIntersecting){e.target.classList.add('in');obs.unobserve(e.target);}});},{threshold:0.08});
  document.querySelectorAll('.r').forEach(el=>obs.observe(el));
}
</script>
